# camera_extrinsics.yaml
#
# Camera optical-frame → world-frame transforms for multi_view_projector_node.
#
# Convention:
#   p_world = R @ p_cam + t
#
#   p_cam  : 3D point in ROS camera optical frame (back_projection.py output)
#            optical frame convention: +Z forward (depth), +X right, +Y down
#   R (3x3): rotation from camera optical frame to world frame
#   t (3,) : camera optical centre position in world frame (metres)
#
# Gazebo assumption: camera sensor body frame has +X as look direction.
# R below is computed as R_body_to_world * R_optical_to_body, where
#   R_optical_to_body = [[0,0,1],[-1,0,0],[0,-1,0]]
#
# IMPORTANT: After changing camera pose in sensors_demo.sdf, recompute R/t here.
# Verify by launching the demo and checking that /world_map clouds align in RViz.
#
# For Isaac Sim:
#   Copy this file, fill in R/t from USD stage camera World Transform, then
#   override at launch:
#     ros2 launch mask_projection_pkg multi_view_projector.launch.py \
#       extrinsics_config:=/path/to/camera_extrinsics_isaac.yaml
#
# ─────────────────────────────────────────────────────────────────────────────

ee_camera:
  # SDF pose: x=0.5  y=0  z=2.5 | roll=0  pitch=0.45rad  yaw=π
  # Camera is at (0.5, 0, 2.5), looking toward −X direction, tilted ~26° down.
  # Adjust pitch in SDF and recompute R if the EE camera view is off.
  t: [0.5, 0.0, 2.5]
  R:
    - [ 0.0,  0.435, -0.900]   # world X  ←  cam optical axes
    - [ 1.0,  0.0,    0.0  ]   # world Y
    - [ 0.0, -0.900, -0.435]   # world Z

top_camera:
  # SDF pose: x=-3  y=2  z=2.5 | roll=0  pitch=π/2=1.5708rad  yaw=0
  # Camera is directly above the table centre, pointing straight down.
  # Table top surface at z≈0.52 → camera-to-surface distance ≈ 2.0 m.
  t: [-3.0, 2.0, 2.5]
  R:
    - [ 0.0, -1.0,  0.0]       # world X  ←  cam optical axes
    - [-1.0,  0.0,  0.0]       # world Y
    - [ 0.0,  0.0, -1.0]       # world Z
