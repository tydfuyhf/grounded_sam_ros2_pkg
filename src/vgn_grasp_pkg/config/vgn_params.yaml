vgn_grasp_node:
  ros__parameters:
    # ROI cube side length (m) — must match VGN model training size
    roi_size_m: 0.30

    # TSDF voxel grid side count — fixed, matches VGN input shape (40x40x40)
    tsdf_resolution: 40

    # VGN weight file path (relative to GSAM_WS, or absolute)
    vgn_model_path: "models/vgn_conv.pth"

    # Grasp quality lower bound for NMS
    min_quality: 0.5

    # Max Top-K candidates to publish
    max_candidates: 5

    # Skip trigger if TARGET point_count is below this
    min_point_count: 50

    # Max distance (m) from TARGET surface to accept a grasp candidate
    semantic_filter_radius: 0.05

    # Input topics
    world_map_topic: "/world_map"
    world_map_result_topic: "/world_map_result"

    # Output topic
    grasp_candidates_topic: "/grasp_candidates"

    # TF frames
    world_frame: "world"
    robot_frame: "panda_link0"
